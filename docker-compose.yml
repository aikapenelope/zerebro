services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Agent configs, run history, LangGraph checkpoints
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zerebro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zerebro_dev}
      POSTGRES_DB: ${POSTGRES_DB:-zerebro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zerebro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis - Pub/sub for streaming, task queues
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Arize Phoenix - AI Observability (tracing, evals, prompts)
  # ---------------------------------------------------------------------------
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
    environment:
      - PHOENIX_WORKING_DIR=/phoenix_data
    volumes:
      - phoenix_data:/phoenix_data

  # ---------------------------------------------------------------------------
  # Zerebro Backend - FastAPI + deepagents
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zerebro}:${POSTGRES_PASSWORD:-zerebro_dev}@postgres:5432/${POSTGRES_DB:-zerebro}
      REDIS_URL: redis://redis:6379/0
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      phoenix:
        condition: service_started
    volumes:
      - ./backend/src:/app/src:cached

volumes:
  postgres_data:
  redis_data:
  phoenix_data:
