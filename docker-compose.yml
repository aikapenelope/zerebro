services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Agent configs, sessions, run history
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zerebro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zerebro_dev}
      POSTGRES_DB: ${POSTGRES_DB:-zerebro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zerebro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Arize Phoenix - AI Observability (tracing, evals, prompts)
  # ---------------------------------------------------------------------------
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "${PHOENIX_PORT:-6006}:6006"
    environment:
      - PHOENIX_WORKING_DIR=/phoenix_data
    volumes:
      - phoenix_data:/phoenix_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6006"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Zerebro Backend - FastAPI + deepagents
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-zerebro}:${POSTGRES_PASSWORD:-zerebro_dev}@postgres:5432/${POSTGRES_DB:-zerebro}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-zerebro}:${POSTGRES_PASSWORD:-zerebro_dev}@postgres:5432/${POSTGRES_DB:-zerebro}
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:cached

  # ---------------------------------------------------------------------------
  # Zerebro Frontend - Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  phoenix_data:
